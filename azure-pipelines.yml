# ──────────────────────────────────────────────────────────────────────────────
# Azure Pipelines – user_service
#
# Stage 1 – Static Analysis  : flake8 syntax / style check
# Stage 2 – Tests            : pytest, results published as JUnit + artifacts
# Stage 3 – Build            : install deps, zip artifact, publish
# Stage 4 – Deploy           : deploy zip to Azure Web App
# ──────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: ubuntu-latest

variables:
  PYTHON_VERSION: "3.12"
  PIP_CACHE_DIR: $(Pipeline.Workspace)/.pip
  # ── Update these two variables to match your environment ──────────────────
  AZURE_SERVICE_CONNECTION: "757c042d-1e11-4044-9f77-780de6d8a542"   # Azure DevOps service connection
  WEBAPP_NAME: "BC-user-service"                           # Azure Web App resource name
  # ──────────────────────────────────────────────────────────────────────────

stages:

# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  STAGE 1 – Static Analysis (flake8)                                     ║
# ╚══════════════════════════════════════════════════════════════════════════╝
- stage: StaticAnalysis
  displayName: "Stage 1 – Static Analysis (flake8)"
  jobs:
    - job: Flake8
      displayName: "flake8 – syntax & style check"

      steps:

        - task: UsePythonVersion@0
          displayName: "Use Python $(PYTHON_VERSION)"
          inputs:
            versionSpec: "$(PYTHON_VERSION)"
            addToPath: true

        - task: Cache@2
          displayName: "Cache pip packages"
          inputs:
            key: 'pip | "$(Agent.OS)" | requirements.txt'
            restoreKeys: |
              pip | "$(Agent.OS)"
            path: $(PIP_CACHE_DIR)

        - script: |
            python -m pip install --upgrade pip
            pip install flake8
          displayName: "Install flake8"

        - script: |
            flake8 . \
              --exclude=.venv,__pycache__,.git \
              --max-line-length=120 \
              --statistics \
              --count \
              --format="%(path)s:%(row)d:%(col)d: %(code)s %(text)s" \
              | tee flake8-report.txt
          displayName: "Run flake8"

        - task: PublishPipelineArtifact@1
          displayName: "Publish flake8 report"
          condition: always()
          inputs:
            targetPath: "flake8-report.txt"
            artifact: "flake8-report"
            publishLocation: "pipeline"


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  STAGE 2 – Tests (pytest)                                               ║
# ╚══════════════════════════════════════════════════════════════════════════╝
- stage: Tests
  displayName: "Stage 2 – Tests (pytest)"
  dependsOn: StaticAnalysis
  condition: succeeded()

  jobs:
    - job: Pytest
      displayName: "pytest – unit tests"

      steps:

        - task: UsePythonVersion@0
          displayName: "Use Python $(PYTHON_VERSION)"
          inputs:
            versionSpec: "$(PYTHON_VERSION)"
            addToPath: true

        - task: Cache@2
          displayName: "Cache pip packages"
          inputs:
            key: 'pip | "$(Agent.OS)" | requirements.txt'
            restoreKeys: |
              pip | "$(Agent.OS)"
            path: $(PIP_CACHE_DIR)

        - script: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            pip install pytest pytest-cov "pydantic[email]" httpx
          displayName: "Install dependencies"

        - script: |
            mkdir -p test-results
            pytest test_user_service.py \
              -v \
              --junitxml=test-results/results.xml \
              --cov=. \
              --cov-report=xml:test-results/coverage.xml \
              --cov-report=term-missing
          displayName: "Run pytest"

        - task: PublishTestResults@2
          displayName: "Publish test results"
          condition: always()
          inputs:
            testResultsFormat: "JUnit"
            testResultsFiles: "test-results/results.xml"
            failTaskOnFailedTests: true
            testRunTitle: "pytest – user_service"

        - task: PublishCodeCoverageResults@2
          displayName: "Publish code coverage"
          condition: always()
          inputs:
            summaryFileLocation: "test-results/coverage.xml"

        - task: PublishPipelineArtifact@1
          displayName: "Publish test artifacts"
          condition: always()
          inputs:
            targetPath: "test-results"
            artifact: "pytest-results"
            publishLocation: "pipeline"


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  STAGE 3 – Build                                                        ║
# ╚══════════════════════════════════════════════════════════════════════════╝
- stage: Build
  displayName: "Stage 3 – Build"
  dependsOn: Tests
  condition: succeeded()

  jobs:
      - job: Build
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.x'
          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
            displayName: 'Install dependencies'
          - script: |
              zip -r app.zip . -x "*.git*" "*__pycache__*"
            displayName: 'Archive app'
          - publish: app.zip
            artifact: drop


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  STAGE 4 – Deploy (Azure Web App)                                       ║
# ╚══════════════════════════════════════════════════════════════════════════╝
- stage: Deploy
  displayName: 'Deploy to Azure Web App'
  dependsOn: Build
  jobs:
    - deployment: DeployWebApp
      environment: 'dev'
      strategy:
        runOnce:
          deploy:
            steps:
              - download: current
                artifact: drop
              - task: AzureWebApp@1
                displayName: "Deploy to Azure Web App"
                inputs:
                  azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
                  appType: "webAppLinux"
                  appName: "$(WEBAPP_NAME)"
                  package: '$(Pipeline.Workspace)/drop/app.zip'
                  runtimeStack: "PYTHON|3.12"
                 