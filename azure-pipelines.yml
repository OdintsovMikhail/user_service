# ──────────────────────────────────────────────────────────────────────────────
# Azure Pipelines – user_service
#
# Stage 1 – Static Analysis  : flake8 syntax / style check
# Stage 2 – Tests            : pytest, results published as JUnit + artifacts
# ──────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: ubuntu-latest

variables:
  PYTHON_VERSION: "3.12"
  PIP_CACHE_DIR: $(Pipeline.Workspace)/.pip

stages:

# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  STAGE 1 – Static Analysis (flake8)                                     ║
# ╚══════════════════════════════════════════════════════════════════════════╝
- stage: StaticAnalysis
  displayName: "Stage 1 – Static Analysis (flake8)"
  jobs:
    - job: Flake8
      displayName: "flake8 – syntax & style check"

      steps:

        # 1. Pin Python version
        - task: UsePythonVersion@0
          displayName: "Use Python $(PYTHON_VERSION)"
          inputs:
            versionSpec: "$(PYTHON_VERSION)"
            addToPath: true

        # 2. Cache pip downloads between runs
        - task: Cache@2
          displayName: "Cache pip packages"
          inputs:
            key: 'pip | "$(Agent.OS)" | requirements.txt'
            restoreKeys: |
              pip | "$(Agent.OS)"
            path: $(PIP_CACHE_DIR)

        # 3. Install only flake8 (keep this stage lean and fast)
        - script: |
            python -m pip install --upgrade pip
            pip install flake8
          displayName: "Install flake8"

        # 4. Run flake8
        #    --max-line-length 120  – matches most modern Python style guides
        #    --statistics           – summary counts per error code
        #    --count                – total error count at the end
        #    Output is written to flake8-report.txt so it can be uploaded
        - script: |
            flake8 . \
              --exclude=.venv,__pycache__,.git \
              --max-line-length=120 \
              --statistics \
              --count \
              --format="%(path)s:%(row)d:%(col)d: %(code)s %(text)s" \
              | tee flake8-report.txt
          displayName: "Run flake8"

        # 5. Publish the lint report as a pipeline artifact
        #    PublishPipelineArtifact@1 is used instead of PublishBuildArtifacts@1
        #    to avoid the "Value cannot be null / securityNamespace" error that
        #    the older task can throw on some Azure DevOps organisations.
        - task: PublishPipelineArtifact@1
          displayName: "Publish flake8 report"
          condition: always()
          inputs:
            targetPath: "flake8-report.txt"
            artifact: "flake8-report"
            publishLocation: "pipeline"


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  STAGE 2 – Tests (pytest)                                               ║
# ╚══════════════════════════════════════════════════════════════════════════╝
- stage: Tests
  displayName: "Stage 2 – Tests (pytest)"
  dependsOn: StaticAnalysis
  condition: succeeded()

  jobs:
    - job: Pytest
      displayName: "pytest – unit tests"

      steps:

        # 1. Pin Python version
        - task: UsePythonVersion@0
          displayName: "Use Python $(PYTHON_VERSION)"
          inputs:
            versionSpec: "$(PYTHON_VERSION)"
            addToPath: true

        # 2. Cache pip downloads
        - task: Cache@2
          displayName: "Cache pip packages"
          inputs:
            key: 'pip | "$(Agent.OS)" | requirements.txt'
            restoreKeys: |
              pip | "$(Agent.OS)"
            path: $(PIP_CACHE_DIR)

        # 3. Install runtime + test dependencies
        #    pydantic[email] is required because schemas.py uses EmailStr
        - script: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            pip install pytest pytest-cov "pydantic[email]"
          displayName: "Install dependencies"

        # 4. Run pytest
        #    --junitxml  – machine-readable results (picked up by PublishTestResults)
        #    --cov       – coverage report in XML (Cobertura) + terminal summary
        #    -v          – verbose output so failures are easy to read in logs
        - script: |
            mkdir -p test-results
            pytest test_user_service.py \
              -v \
              --junitxml=test-results/results.xml \
              --cov=. \
              --cov-report=xml:test-results/coverage.xml \
              --cov-report=term-missing
          displayName: "Run pytest"

        # 5. Publish JUnit test results (shows pass/fail in the Azure Pipelines UI)
        - task: PublishTestResults@2
          displayName: "Publish test results"
          condition: always()
          inputs:
            testResultsFormat: "JUnit"
            testResultsFiles: "test-results/results.xml"
            failTaskOnFailedTests: true
            testRunTitle: "pytest – user_service"

        # 6. Publish code coverage (Cobertura XML → Coverage tab in the UI)
        - task: PublishCodeCoverageResults@2
          displayName: "Publish code coverage"
          condition: always()
          inputs:
            summaryFileLocation: "test-results/coverage.xml"

        # 7. Upload the entire test-results folder as a pipeline artifact
        #    Same fix as Stage 1 – use PublishPipelineArtifact@1 instead of
        #    PublishBuildArtifacts@1 to avoid the securityNamespace null error.
        - task: PublishPipelineArtifact@1
          displayName: "Publish test artifacts"
          condition: always()
          inputs:
            targetPath: "test-results"
            artifact: "pytest-results"
            publishLocation: "pipeline"