# ──────────────────────────────────────────────────────────────────────────────
# Azure Pipelines – user_service
#
# Stage 1 – Static Analysis  : flake8 syntax / style check
# Stage 2 – Tests            : pytest, results published as JUnit + artifacts
# Stage 3 – Build            : install deps, zip artifact, publish
# Stage 4 – Deploy           : deploy zip to Azure Web App
# ──────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: ubuntu-latest

variables:
  PYTHON_VERSION: "3.12"
  PIP_CACHE_DIR: $(Pipeline.Workspace)/.pip
  # ── Update these two variables to match your environment ──────────────────
  AZURE_SERVICE_CONNECTION: "757c042d-1e11-4044-9f77-780de6d8a542"   # Azure DevOps service connection
  WEBAPP_NAME: "BC-user-service"                           # Azure Web App resource name
  # ──────────────────────────────────────────────────────────────────────────

stages:

# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  STAGE 1 – Static Analysis (flake8)                                     ║
# ╚══════════════════════════════════════════════════════════════════════════╝
- stage: StaticAnalysis
  displayName: "Stage 1 – Static Analysis (flake8)"
  jobs:
    - job: Flake8
      displayName: "flake8 – syntax & style check"

      steps:

        - task: UsePythonVersion@0
          displayName: "Use Python $(PYTHON_VERSION)"
          inputs:
            versionSpec: "$(PYTHON_VERSION)"
            addToPath: true

        - task: Cache@2
          displayName: "Cache pip packages"
          inputs:
            key: 'pip | "$(Agent.OS)" | requirements.txt'
            restoreKeys: |
              pip | "$(Agent.OS)"
            path: $(PIP_CACHE_DIR)

        - script: |
            python -m pip install --upgrade pip
            pip install flake8
          displayName: "Install flake8"

        - script: |
            flake8 . \
              --exclude=.venv,__pycache__,.git \
              --max-line-length=120 \
              --statistics \
              --count \
              --format="%(path)s:%(row)d:%(col)d: %(code)s %(text)s" \
              | tee flake8-report.txt
          displayName: "Run flake8"

        - task: PublishPipelineArtifact@1
          displayName: "Publish flake8 report"
          condition: always()
          inputs:
            targetPath: "flake8-report.txt"
            artifact: "flake8-report"
            publishLocation: "pipeline"


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  STAGE 2 – Tests (pytest)                                               ║
# ╚══════════════════════════════════════════════════════════════════════════╝
- stage: Tests
  displayName: "Stage 2 – Tests (pytest)"
  dependsOn: StaticAnalysis
  condition: succeeded()

  jobs:
    - job: Pytest
      displayName: "pytest – unit tests"

      steps:

        - task: UsePythonVersion@0
          displayName: "Use Python $(PYTHON_VERSION)"
          inputs:
            versionSpec: "$(PYTHON_VERSION)"
            addToPath: true

        - task: Cache@2
          displayName: "Cache pip packages"
          inputs:
            key: 'pip | "$(Agent.OS)" | requirements.txt'
            restoreKeys: |
              pip | "$(Agent.OS)"
            path: $(PIP_CACHE_DIR)

        - script: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            pip install pytest pytest-cov "pydantic[email]"
          displayName: "Install dependencies"

        - script: |
            mkdir -p test-results
            pytest test_user_service.py \
              -v \
              --junitxml=test-results/results.xml \
              --cov=. \
              --cov-report=xml:test-results/coverage.xml \
              --cov-report=term-missing
          displayName: "Run pytest"

        - task: PublishTestResults@2
          displayName: "Publish test results"
          condition: always()
          inputs:
            testResultsFormat: "JUnit"
            testResultsFiles: "test-results/results.xml"
            failTaskOnFailedTests: true
            testRunTitle: "pytest – user_service"

        - task: PublishCodeCoverageResults@2
          displayName: "Publish code coverage"
          condition: always()
          inputs:
            summaryFileLocation: "test-results/coverage.xml"

        - task: PublishPipelineArtifact@1
          displayName: "Publish test artifacts"
          condition: always()
          inputs:
            targetPath: "test-results"
            artifact: "pytest-results"
            publishLocation: "pipeline"


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  STAGE 3 – Build                                                        ║
# ╚══════════════════════════════════════════════════════════════════════════╝
- stage: Build
  displayName: "Stage 3 – Build"
  dependsOn: Tests
  condition: succeeded()

  jobs:
    - job: Build
      displayName: "Install deps & zip application"

      steps:

        # 1. Pin Python version
        - task: UsePythonVersion@0
          displayName: "Use Python $(PYTHON_VERSION)"
          inputs:
            versionSpec: "$(PYTHON_VERSION)"
            addToPath: true

        # 2. Install dependencies into .python_packages so they are bundled
        #    inside the zip. Azure App Service resolves packages from this path.
        - script: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt \
              --target=".python_packages/lib/site-packages"
          displayName: "Install dependencies"

        # 3. Zip source + installed packages, excluding test/CI clutter
        - task: ArchiveFiles@2
          displayName: "Zip application"
          inputs:
            rootFolderOrFile: "$(System.DefaultWorkingDirectory)"
            includeRootFolder: false
            archiveType: "zip"
            archiveFile: "$(Build.ArtifactStagingDirectory)/app.zip"
            replaceExistingArchive: true
            excludePaths: |
              .venv
              __pycache__
              .git
              test-results
              flake8-report.txt
              test_*.py

        # 4. Publish the zip so the Deploy stage can download it.
        #    Also useful for manual re-deploys without re-running the pipeline.
        - task: PublishPipelineArtifact@1
          displayName: "Publish app zip artifact"
          inputs:
            targetPath: "$(Build.ArtifactStagingDirectory)/app.zip"
            artifact: "app-zip"
            publishLocation: "pipeline"


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  STAGE 4 – Deploy (Azure Web App)                                       ║
# ╚══════════════════════════════════════════════════════════════════════════╝
- stage: Deploy
  displayName: "Stage 4 – Deploy (Azure Web App)"
  dependsOn: Build
  # Only deploy from main; remove this condition to deploy from all branches
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

  jobs:
    - job: Deploy
      displayName: "Deploy zip to Azure Web App"

      steps:

        # 1. Download the zip artifact produced by the Build stage
        - task: DownloadPipelineArtifact@2
          displayName: "Download app zip artifact"
          inputs:
            artifact: "app-zip"
            targetPath: "$(Pipeline.Workspace)/app-zip"

        # 2. Deploy to Azure Web App via the service connection.
        #    The task handles authentication; no credentials appear in the YAML.
        - task: AzureWebApp@1
          displayName: "Deploy to Azure Web App"
          inputs:
            azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
            appType: "webAppLinux"
            appName: "$(WEBAPP_NAME)"
            package: "$(Pipeline.Workspace)/app-zip/app.zip"
            runtimeStack: "PYTHON|3.12"
            # startUpCommand is optional – uncomment and set for custom entrypoints, e.g.:
            # startUpCommand: "gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app"